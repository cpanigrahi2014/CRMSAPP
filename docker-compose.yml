      context: ./crm-ai-agent
      dockerfile: Dockerfile
    container_name: crm-ai-agent
    ports:
      - "9100:9100"
    environment:
      NODE_ENV: production
      PORT: 9100
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/crm_ai_agent
      OPENAI_API_KEY: ${LLM_API_KEY:-your-api-key}
      OPENAI_MODEL: ${LLM_DEFAULT_MODEL:-gpt-4o}
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiB0aGF0IGlzIGF0IGxlYXN0IDI1NiBiaXRz
      AI_CONFIRMATION_MODE: "true"
      CRM_AUTH_URL: http://auth-service:8081
      CRM_LEAD_URL: http://lead-service:8082
      CRM_ACCOUNT_URL: http://account-service:8083
      CRM_CONTACT_URL: http://contact-service:8084
      CRM_OPPORTUNITY_URL: http://opportunity-service:8085
      CRM_ACTIVITY_URL: http://activity-service:8086
      CRM_NOTIFICATION_URL: http://notification-service:8087
      CRM_WORKFLOW_URL: http://workflow-service:8088
